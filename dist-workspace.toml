[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["homebrew"]
# shell/powershell installers are hand-written (install.sh / install.ps1) and uploaded as extra-artifacts
extra-artifacts = [
  { path = "install.sh",  kind = "installer" },
  { path = "install.ps1", kind = "installer" },
]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-musl", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-unknown-linux-musl", "x86_64-pc-windows-msvc"]
# Homebrew tap repository
tap = "epicsagas/homebrew-tap"
formula = "obsidian-forge"
# Publish jobs
publish-jobs = ["homebrew"]
allow-dirty = ["ci"]
macos-sign = false
# Install location (matches cargo install behavior)
install-path = "CARGO_HOME"
# Run dist plan on PRs for early error detection
pr-run-mode = "plan"
# Source tarball
source-tarball = true
