name: dashboard-release

# 대시보드 데스크톱 설치본(.dmg / .AppImage / .msi)을 빌드해 GitHub Release에 추가.
# cargo-dist(release.yml)가 Release를 생성한 뒤에만 실행된다(workflow_run 순서 보장).
# 이전에는 두 워크플로우가 같은 태그에서 동시에 Release를 create-or-upload하려 해
# 경쟁 조건("a release with the same tag name already exists")이 발생했다.
# 이제 dashboard는 항상 cargo-dist가 만든 Release에 upload-only로 동작한다.
#
# 참고: 미서명 빌드. macOS Gatekeeper / Windows SmartScreen 경고는 README 우회 안내 참조.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach builds to (e.g. v0.3.1)'
        required: true
  workflow_run:
    workflows: ["Release"]
    types: [completed]

permissions:
  contents: write

jobs:
  build-dashboard:
    # cargo-dist가 Release 생성에 실패하면 dashboard도 실행하지 않는다(불완전 Release 방지).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            rust_target: aarch64-apple-darwin
            tauri_target: '--target aarch64-apple-darwin'
          - platform: ubuntu-22.04
            rust_target: ''
            tauri_target: ''
          - platform: windows-latest
            rust_target: ''
            tauri_target: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Resolve release tag
        id: tag
        run: |
          tag="${{ github.event.inputs.tag || github.event.workflow_run.head_branch }}"
          [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]] || { echo "::warning::not a release tag: $tag"; exit 1; }
          echo "name=$tag" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v7
        with:
          ref: ${{ steps.tag.outputs.name }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev

      - name: Install UI dependencies
        run: npm ci
        working-directory: ui

      - name: Build & upload dashboard bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.tag.outputs.name }}
          releaseName: 'Dashboard ${{ steps.tag.outputs.name }}'
          releaseBody: |
            Desktop dashboard builds (${{ steps.tag.outputs.name }}).
            Unsigned — see README for macOS Gatekeeper and Windows SmartScreen bypass.
          releaseDraft: false
          prerelease: false
          args: --features dashboard-ui ${{ matrix.tauri_target }}
